services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: cafe_skazka
      POSTGRES_USER: cafe_user
      POSTGRES_PASSWORD: cafe_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafe_user -d cafe_skazka"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: